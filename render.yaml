# Render Blueprint — connect repo at:
# https://dashboard.render.com/project/prj-d952s0m7r5hc73duups0
#
# After push: Render Dashboard → New → Blueprint → select anujchoudhary2692-boop/vedas
# Set MONGODB_URI to your MongoDB Atlas connection string (Database → Connect).

services:
  - type: web
    name: vedas-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: VEDAS_MEDIA_BASE_URL
        value: https://vedas-oax2.onrender.com/api/media
      - key: VEDAS_CORS_ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: vedas-web
    runtime: docker
    region: singapore
    plan: free
    rootDir: vedas-web
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
