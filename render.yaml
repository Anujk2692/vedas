# Render Blueprint — connect repo at:
# https://dashboard.render.com/project/prj-d952s0m7r5hc73duups0
#
# After push: Render Dashboard → New → Blueprint → select anujchoudhary2692-boop/vedas
# Set MONGODB_URI to your MongoDB Atlas connection string (Database → Connect).

services:
  - type: web
    name: vedas-api
    runtime: java
    region: singapore
    plan: free
    rootDir: vedas-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/vedas-backend-1.0.0.jar
    healthCheckPath: /api/health
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: VEDAS_MEDIA_BASE_URL
        value: https://vedas-api.onrender.com/api/media
      - key: VEDAS_CORS_ALLOWED_ORIGINS
        value: "*"
