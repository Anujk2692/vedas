server:
  port: ${PORT:8080}

spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/vedas}
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

vedas:
  cors:
    allowed-origins: ${VEDAS_CORS_ALLOWED_ORIGINS:*}
  media:
    base-url: ${VEDAS_MEDIA_BASE_URL:http://localhost:8080/api/media}
  seed:
    force: false
