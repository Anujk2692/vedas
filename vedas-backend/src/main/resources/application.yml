server:
  port: ${PORT:8080}

spring:
  data:
    mongodb:
      # Prefer DB name vedas_service_db (Atlas / production). Override with SPRING_DATA_MONGODB_URI.
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/vedas_service_db}
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

vedas:
  cors:
    allowed-origins: ${VEDAS_CORS_ALLOWED_ORIGINS:*}
  media:
    base-url: ${VEDAS_MEDIA_BASE_URL:http://localhost:8080/api/media}
  seed:
    force: false
  ai:
    enabled: ${VEDAS_AI_ENABLED:false}
    openai-api-key: ${VEDAS_OPENAI_API_KEY:}
    model: ${VEDAS_AI_MODEL:gpt-4o-mini}
